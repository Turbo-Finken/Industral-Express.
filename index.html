<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Industrial Express - Anti-Cheat Edition</title>
<style>
    body { margin: 0; overflow: hidden; background: radial-gradient(circle, #2c3e50, #000); font-family: 'Segoe UI', Roboto, sans-serif; color: #f1c40f; user-select: none; }
    #hud {
        position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(45, 30, 15, 0.85); padding: 20px 40px; border: 2px solid #d4af37;
        border-radius: 25px; backdrop-filter: blur(10px); text-align: center; min-width: 400px; z-index: 10;
    }
    #stats { position: absolute; right: 20px; top: 20px; font-size: 20px; padding: 15px; background: rgba(0,0,0,0.6); border-radius: 20px; border: 1px solid #d4af37; z-index: 10; }
    #combo-info { font-size: 14px; color: #aaa; margin-top: 5px; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: background 0.3s ease; z-index: 5; }
    #game-over { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 10, 5, 0.95); padding: 40px; border-radius: 30px; border: 4px solid #d4af37; text-align: center; display: none; z-index: 100; box-shadow: 0 0 100px rgba(0,0,0,1); }
    button { background: #d4af37; color: #222; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 15px; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
    button:hover { transform: scale(1.1); background: #f1c40f; }
    .heart { display: inline-block; width: 20px; height: 20px; background: #e74c3c; margin: 0 4px; border-radius: 4px; transition: transform 0.3s; }
    .heart.lost { background: #333; opacity: 0.5; transform: scale(0.8); }
    canvas { display: block; }
</style>
</head>
<body oncontextmenu="return false;">

<div id="overlay"></div>
<div id="hud">
    <div id="question-text">LADEN...</div>
    <div id="combo-info">Serie: <span id="combo-count">0</span>/8 für ❤️</div>
</div>
<div id="stats">
    <div id="heart-container"></div>
    <div style="margin-top:8px; font-weight: bold;">⭐ <span id="score">0</span></div>
</div>

<div id="game-over">
    <h1>Kessel explodiert!</h1>
    <p>Deine Reise ist zu Ende.</p>
    <h2 id="final-score">Punkte: 0</h2>
    <button onclick="resetGame()">Neue Fahrt beginnen</button>
</div>

<canvas id="game"></canvas>

<script>
// ANTI-CHEAT
document.onkeydown = function(e) {
    if(e.keyCode == 123) return false;
    if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) return false;
    if(e.ctrlKey && e.keyCode == 85) return false;
};

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let tracks = [canvas.width/2 - 250, canvas.width/2, canvas.width/2 + 250];
let currentTrack = 1;
let trainX = tracks[currentTrack];
let targetX = trainX;
let score = 0;
let lives = 3;
let combo = 0;
let answerY = -200;
let gameActive = true;
let currentQIndex = 0;
const speed = 2.1;

// Rauch-Partikel Array
let smokeParticles = [];

const questions = [ 
    { q: "Was markiert den Kern der Industriellen Revolution?", a: ["Rückkehr zum Handwerk", "Übergang zur Massenproduktion", "Abschaffung des Geldes", "Fokus auf Landwirtschaft"], c: 1, info: "Richtig! Die Fabrikproduktion ersetzte die alte Heimarbeit." },
    { q: "Welche technische Erfindung war der Hauptmotor der Industrialisierung?", a: ["Buchdruck", "Dampfmaschine", "Computer", "Windrad"], c: 1, info: "Genau! James Watts Dampfmaschine lieferte die nötige Antriebskraft." },
    { q: "Wie wird die „Soziale Frage“ historisch definiert?", a: ["Berufsumfrage", "Technik-Frage", "Elend der Arbeiterklasse", "Steuerstrategie"], c: 2, info: "Korrekt. Sie beschreibt die massiven sozialen Probleme jener Zeit." },
    { q: "Wie lange arbeiteten Kinder oft unter industriellen Bedingungen?", a: ["4 Stunden", "6 Stunden", "8 Stunden", "12 bis 16 Stunden"], c: 3, info: "Leider wahr: Kinderarbeit ohne Pausen war an der Tagesordnung." },
    { q: "Warum setzte man Kinder bevorzugt in Kohlebergwerken ein?", a: ["Wegen Gasen", "Geringe Körpergrösse für enge Stollen", "Technische Ausbildung", "Gesetzliche Pflicht"], c: 1, info: "Stimmt. Kinder kamen dort hin, wo Erwachsene zu gross waren." },
    { q: "Welche Auswirkung hatte die Fabrikarbeit auf die Bildung der Kinder?", a: ["Lesestunden", "Keine Zeit für Schulbildung", "Mathe-Unterricht", "Nachtschulzeit"], c: 1, info: "Richtig. Die Arbeit liess keinen Raum für Lernen oder Entwicklung." },
    { q: "Was versteht man unter dem Begriff „Proletariat“?", a: ["Fabrikbesitzer", "Klasse der lohnabhängigen Arbeiter", "Maschinenstürmer", "Beamte"], c: 1, info: "Korrekt. Proletarier besassen nichts ausser ihrer Arbeitskraft." },
    { q: "Wie sahen die Löhne für das Proletariat meistens aus?", a: ["Sehr hoch", "Faire Gehälter", "Hungerlöhne", "Fabrikanteile"], c: 2, info: "Stimmt. Der Lohn reichte oft kaum zum Überleben der Familie." },
    { q: "Wer erfand die „Spinning Jenny“ im Jahr 1765?", a: ["James Watt", "James Hargreaves", "Richard Guest", "Jenny"], c: 1, info: "Richtig! James Hargreaves revolutionierte damit das Spinnen." },
    { q: "Warum nannte man die Maschine vermutlich „Spinning Jenny“?", a: ["Abkürzung", "Nach Hargreaves Tochter oder Frau", "Vom König gewählt", "Fachbegriff"], c: 1, info: "Genau, es wird vermutet, dass der Name aus seinem Umfeld kam." },
    { q: "Wie viele Spinner ersetzte die Spinning Jenny anfangs?", a: ["Einen", "Etwa 4 bis 8", "Eine ganze Stadt", "Keinen"], c: 1, info: "Korrekt. Die Effizienz wurde schlagartig vervielfacht." },
    { q: "Wodurch wurde die erste Version der Spinning Jenny betrieben?", a: ["Dampf", "Wasser", "Handkurbel", "Federn"], c: 2, info: "Richtig. Die erste Version erforderte noch Muskelkraft." },
    { q: "Was ist die „Waterframe“ im Kontext der Spinnmaschinen?", a: ["Reinigungsrahmen", "Spinnmaschine durch Wasserkraft", "Dampfmaschine", "Messgerät"], c: 1, info: "Stimmt. Wasser war hier der Energielieferant." },
    { q: "Welche Maschine kombinierte Jenny und Waterframe?", a: ["Selfaktor", "Spinning Mule", "Webstuhl", "Lokomotive"], c: 1, info: "Richtig! Die 'Mule' (Maultier) war eine Kreuzung beider." },
    { q: "Welche Energiequelle löste die Dampfmaschine ab?", a: ["Sonne", "Wind, Wasser und Muskelkraft", "Kernkraft", "Batterien"], c: 1, info: "Genau. Fabriken wurden unabhängig von Naturkräften." },
    { q: "Wo konnten Fabriken dank der Dampfmaschine entstehen?", a: ["Nur im Wald", "Überall, vor allem in Städten", "Nur am Meer", "Auf Bergen"], c: 1, info: "Stimmt. Standorte wurden flexibel wählbar." },
    { q: "Welchen Kreislauf löste die Dampfmaschine aus?", a: ["Kohle -> Maschinen -> Eisen", "Arbeit -> Freizeit", "Wollverbot", "Rückzug aufs Land"], c: 0, info: "Richtig! Ein Motor, der sich selbst beschleunigte." },
    { q: "Was war die „Spinning Jenny“ technisch gesehen genau?", a: ["Webstuhl", "Mehrspindel-Spinnmaschine", "Transportwagen", "Reiniger"], c: 1, info: "Genau. Sie konnte viele Fäden gleichzeitig spinnen." },
    { q: "Wie beeinflusste die Eisenbahn das Zeitgefühl?", a: ["Keine Uhren mehr", "Feste Fahrpläne", "Längere Reisezeit", "Dorfzeit"], c: 1, info: "Stimmt. Pünktlichkeit wurde plötzlich essenziell." },
    { q: "Was passierte bei Arbeitsunfähigkeit im Proletariat?", a: ["Rente", "Staatshilfe", "Entlassung und Not", "Geld von Kollegen"], c: 2, info: "Bittere Realität: Es gab keine soziale Absicherung." },
    { q: "Warum wurde Kleidung zum Massenprodukt?", a: ["Mehr Bedarf", "Schnellere & billigere Produktion", "Geschenke", "Handarbeitsverbot"], c: 1, info: "Richtig. Die Industrie machte Stoffe erschwinglich." },
    { q: "Welche Rolle spielte die Kohle?", a: ["Brot-Ersatz", "Brennstoff für Maschinen", "Deko", "Kleidungsstoff"], c: 1, info: "Genau. Ohne Kohle keine Dampfkraft." },
    { q: "Wie waren die Wohnverhältnisse in Arbeiterquartieren?", a: ["Luxuriös", "Eng, überfüllt und unhygienisch", "Eigene Häuser", "Villen"], c: 1, info: "Stimmt. Ganze Familien teilten sich oft ein einziges Zimmer." },
    { q: "Welches Land gilt als Mutterland der Industrialisierung?", a: ["Deutschland", "Frankreich", "Grossbritannien", "USA"], c: 2, info: "Richtig! In England fing alles an." },
    { q: "Was versteht man unter Urbanisierung?", a: ["Landflucht in die Städte", "Bau von Parks", "Abriss von Fabriken", "Urlaubsreisen"], c: 0, info: "Stimmt. Millionen Menschen zogen in die Städte." },
    { q: "Wer erfand die verbesserte Dampfmaschine?", a: ["Einstein", "James Watt", "Newton", "Tesla"], c: 1, info: "Genau, James Watt machte sie erst effizient." },
    { q: "Was war ein Hauptproblem der frühen Fabriken?", a: ["Zu viel Urlaub", "Lärm, Hitze und Abgase", "Zu hohe Löhne", "Geringe Arbeitszeit"], c: 1, info: "Richtig. Die Bedingungen waren extrem gesundheitsschädlich." },
    { q: "Wie nannte man die Unternehmer, die Fabriken besassen?", a: ["Proletarier", "Bourgeoisie", "Ritter", "Bauern"], c: 1, info: "Korrekt. Sie bildeten die neue reiche Oberschicht." },
    { q: "Welches Transportmittel revolutionierte den Handel zu Land?", a: ["Pferdekutsche", "Eisenbahn", "Auto", "Flugzeug"], c: 1, info: "Richtig! Die Eisenbahn war das Symbol des Fortschritts." },
    { q: "Was war der 'Luddismus'?", a: ["Eine neue Mode", "Zerstörung von Maschinen aus Angst", "Eine Musikrichtung", "Eine Religion"], c: 1, info: "Stimmt. Maschinenstürmer sahen in der Technik ihren Feind." },
    { q: "Wie nannte man die Abgase über den Industriestädten?", a: ["Nebel", "Smog", "Sauerstoff", "Dunst"], c: 1, info: "Richtig. Die Luftverschmutzung war massiv." },
    { q: "Wer schrieb das 'Kommunistische Manifest'?", a: ["James Watt", "Karl Marx & Friedrich Engels", "Napoleon", "Bismarck"], c: 1, info: "Korrekt. Es war eine Antwort auf die Not der Arbeiter." },
    { q: "Welcher Rohstoff war für die Eisenherstellung wichtig?", a: ["Gold", "Eisenerz", "Silber", "Kupfer"], c: 1, info: "Stimmt. Eisen war das Skelett der Maschinen." },
    { q: "Was ersetzte die Dampfmaschine später als Energiequelle?", a: ["Elektrizität", "Holz", "Pferde", "Wale"], c: 0, info: "Richtig. Strom wurde die Energie der zweiten Revolution." },
    { q: "Was war die Folge von zu viel Produktion?", a: ["Mehr Hunger", "Überproduktion und Wirtschaftskrisen", "Weniger Handel", "Weltfrieden"], c: 1, info: "Korrekt. Der Markt war manchmal gesättigt." },
    { q: "Wie nannte man die grossen Zusammenschlüsse von Arbeitern?", a: ["Armeen", "Gewerkschaften", "Sportvereine", "Kirchen"], c: 1, info: "Richtig! Sie kämpften für bessere Rechte." },
    { q: "Was wurde durch die Industrialisierung eingeführt?", a: ["Schichtarbeit", "Jederzeit frei", "Nur Sonntagsarbeit", "Heimarbeit-Pflicht"], c: 0, info: "Stimmt. Die Maschinen durften nie stillstehen." },
    { q: "Was war die erste grosse Industriebranche?", a: ["Autoindustrie", "Textilindustrie", "Computertechnik", "Raumfahrt"], c: 1, info: "Genau. Alles begann mit Baumwolle und Webstühlen." },
    { q: "Wie nennt man den Wandel der Gesellschaft heute?", a: ["Industrie 4.0", "Steinzeit", "Mittelalter", "Handwerksära"], c: 0, info: "Richtig! Wir befinden uns in der digitalen Vernetzung." },
    { q: "Was war ein Ziel der ersten Arbeitergesetze?", a: ["Mehr Steuern", "Verbot von Kinderarbeit", "Längere Arbeitszeit", "Höhere Preise"], c: 1, info: "Genau. Erste Gesetze sollten die Kleinsten schützen." }
]


function updateHearts() {
    const container = document.getElementById("heart-container");
    container.innerHTML = "";
    for(let i=0; i<3; i++) {
        let h = document.createElement("div");
        h.className = "heart" + (i >= lives ? " lost" : "");
        container.appendChild(h);
    }
}

function nextQuestion() {
    currentQIndex = Math.floor(Math.random() * questions.length);
    document.getElementById("question-text").innerText = questions[currentQIndex].q;
    answerY = -150;
}

function gameOver() {
    gameActive = false;
    document.getElementById("game-over").style.display = "block";
    document.getElementById("final-score").innerText = "Punkte: " + score;
}

function resetGame() { location.reload(); }

window.addEventListener("keydown", (e) => {
    if(e.key === "ArrowLeft" && currentTrack > 0) currentTrack--;
    if(e.key === "ArrowRight" && currentTrack < 2) currentTrack++;
    targetX = tracks[currentTrack];
});

function drawSmoke() {
    smokeParticles.push({x: trainX, y: canvas.height - 130, size: 5, alpha: 1});
    for(let i = smokeParticles.length - 1; i >= 0; i--) {
        let p = smokeParticles[i];
        p.y -= 2; p.size += 0.5; p.alpha -= 0.02;
        ctx.fillStyle = `rgba(150, 150, 150, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        if(p.alpha <= 0) smokeParticles.splice(i, 1);
    }
}

function draw() {
    if(!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Gleise
    ctx.strokeStyle = "rgba(212, 175, 55, 0.2)";
    ctx.lineWidth = 4;
    tracks.forEach(t => {
        ctx.beginPath(); ctx.moveTo(t, 0); ctx.lineTo(t, canvas.height); ctx.stroke();
    });

    // ZUG DESIGN
    trainX += (targetX - trainX) * 0.15;
    
    // Rauch zeichnen
    drawSmoke();

    // Hauptkörper (Dampflok)
    ctx.fillStyle = "#3e2723"; // Dunkles Braun/Eisen
    ctx.fillRect(trainX - 45, canvas.height - 110, 90, 90);
    
    // Dach/Führerhaus
    ctx.fillStyle = "#d4af37";
    ctx.fillRect(trainX - 50, canvas.height - 120, 100, 15);
    
    // Fenster
    ctx.fillStyle = "#add8e6";
    ctx.fillRect(trainX - 25, canvas.height - 95, 50, 30);
    
    // Schornstein
    ctx.fillStyle = "#222";
    ctx.fillRect(trainX - 10, canvas.height - 140, 20, 30);
    ctx.fillRect(trainX - 15, canvas.height - 145, 30, 10);

    // Goldene Zierleiste
    ctx.fillStyle = "#d4af37";
    ctx.fillRect(trainX - 45, canvas.height - 50, 90, 5);

    // Antworten
    answerY += speed;
    questions[currentQIndex].a.forEach((text, i) => {
        ctx.fillStyle = "rgba(45, 30, 15, 0.9)";
        ctx.strokeStyle = "#d4af37";
        ctx.fillRect(tracks[i] - 110, answerY, 220, 60);
        ctx.strokeRect(tracks[i] - 110, answerY, 220, 60);
        ctx.fillStyle = "#f1c40f";
        ctx.font = "bold 18px Arial";
        ctx.textAlign = "center";
        ctx.fillText(text, tracks[i], answerY + 38);
    });

    // Kollision
    if (answerY > canvas.height - 150 && answerY < canvas.height - 50) {
        if (currentTrack === questions[currentQIndex].c) {
            score += 100;
            combo++;
            if(combo >= 8 && lives < 3) { lives++; combo = 0; }
            overlay.style.background = "rgba(46, 204, 113, 0.15)";
        } else {
            lives--;
            combo = 0;
            overlay.style.background = "rgba(231, 76, 60, 0.25)";
            if(lives <= 0) gameOver();
        }
        setTimeout(() => overlay.style.background = "transparent", 200);
        document.getElementById("score").innerText = score;
        document.getElementById("combo-count").innerText = combo;
        updateHearts();
        nextQuestion();
    }

    if (answerY > canvas.height) { 
        lives--; updateHearts(); nextQuestion(); 
        if(lives <= 0) gameOver(); 
    }

    requestAnimationFrame(draw);
}

updateHearts();
nextQuestion();
draw();
</script>
</body>
</html>
